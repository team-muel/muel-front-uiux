# Render service template - fill placeholders before using
# See: https://render.com/docs/deploying-services#render-yaml
services:
  - type: web_service
    name: yt-discord-server
    env: node
    plan: free # choose appropriate plan
    repo: "<GIT_REPO_URL>"
    branch: main
    buildCommand: "npm ci --include=dev && npm run build"
    startCommand: "npm run start:server"
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: SUPABASE_URL
        fromDatabase: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        fromDatabase: false
      - key: DATABASE_URL
        fromDatabase: false
