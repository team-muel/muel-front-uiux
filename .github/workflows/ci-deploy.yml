name: CI — Migrate & Deploy

on:
  push:
    branches: [main]

concurrency:
  group: ci-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  migrate-and-deploy:
    name: Migrate, Build, Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --include=optional --no-audit --no-fund

      - name: Verify Tailwind native binding
        id: verify_tailwind_oxide
        continue-on-error: true
        run: npm run check:tailwind-binding

      - name: Recover optional native deps if needed
        if: steps.verify_tailwind_oxide.outcome == 'failure'
        run: |
          rm -rf node_modules
          npm install --include=optional --no-audit --no-fund

      - name: Re-verify Tailwind native binding
        if: steps.verify_tailwind_oxide.outcome == 'failure'
        run: npm run check:tailwind-binding

      - name: Tailwind native binding summary
        if: always()
        run: |
          echo "verify_tailwind_oxide.outcome=${{ steps.verify_tailwind_oxide.outcome }}"
          if [ "${{ steps.verify_tailwind_oxide.outcome }}" = "failure" ]; then
            echo "Recovery path executed: node_modules reinstall with optional deps"
          else
            echo "Recovery path skipped: initial install already healthy"
          fi

      - name: Run lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Install psql (for migrations)
        if: env.DATABASE_URL != '' && hashFiles('supabase/migrations/*.sql') != ''
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Try Supabase CLI migrations (optional)
        if: env.SUPABASE_PROJECT_REF != '' && env.SUPABASE_SERVICE_ROLE_KEY != ''
        run: |
          echo "Attempting Supabase CLI migration deploy"
          npx supabase@latest --version || true
          npx supabase@latest migration deploy --project-ref $SUPABASE_PROJECT_REF --service-role-key $SUPABASE_SERVICE_ROLE_KEY || true

      - name: Run DB migrations (supabase/migrations)
        if: env.DATABASE_URL != '' && hashFiles('supabase/migrations/*.sql') != ''
        run: |
          echo "Running SQL migrations from supabase/migrations"
          ls -1 supabase/migrations || exit 0
          for f in supabase/migrations/*.sql; do
            echo "Applying $f"
            psql "$DATABASE_URL" -f "$f"
          done

      - name: Trigger Render deploy (server & worker)
        if: env.RENDER_API_KEY != '' && env.RENDER_SERVICE_ID != ''
        run: |
          echo "Triggering Render deploy for $RENDER_SERVICE_ID"
          curl -s -X POST "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys" \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{}' \
            | jq -r '.message // .id // .' || true

      - name: Trigger Vercel deploy (optional)
        if: env.VERCEL_TOKEN != '' && env.VERCEL_PROJECT_ID != ''
        run: |
          echo "Triggering Vercel deployment (optional)"
          curl -s -X POST "https://api.vercel.com/v13/deployments" \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"name":"'$VERCEL_PROJECT_ID'","target":"production"}' \
            || echo "Vercel trigger may fail if GitHub integration is active"
